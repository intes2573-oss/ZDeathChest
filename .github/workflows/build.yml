name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: mvn package -f ZDeathChest-1.1-src/plugin/pom.xml
      - uses: actions/upload-artifact@v4
        with:
          name: ZDeathChest
          path: ZDeathChest-1.1-src/plugin/target/ZDeathChest-1.1.jar
